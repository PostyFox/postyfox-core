name: deploy

permissions:
  contents: read

on:
  workflow_run:
    workflows: [platform-ci]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}

jobs:
  check-prerequisites:
    # Verify all required secrets are configured
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          missing=0

          if [ -z "$DEPLOY_HOST" ]; then
            echo "❌ Missing required secret: DEPLOY_HOST"
            missing=1
          fi

          if [ -z "$DEPLOY_USER" ]; then
            echo "❌ Missing required secret: DEPLOY_USER"
            missing=1
          fi

          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "❌ Missing required secret: DEPLOY_SSH_KEY"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo
            echo "Configure them in: Settings -> Secrets and variables -> Actions"
            exit 1
          fi

          echo "✅ Required deployment secrets are configured"

  deploy-dev:
    # Runs on the self-hosted dev agent; production still deploys over SSH.
    needs: check-prerequisites
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: [self-hosted]
    environment: development
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve image repository
        id: image
        run: |
          echo "repository=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Determine stack dir
        id: stack
        run: |
          echo "dir=/opt/postyfox/dev" >> "$GITHUB_OUTPUT"

      - name: Copy deployment files
        env:
          STACK_DIR: ${{ steps.stack.outputs.dir }}
        run: |
          echo "🧹 Removing stale gateway config, preserving any frontend-deployed overrides (conf.d/*.conf is glob-included; leftover fragments would still load)..."
          # The postyfox-frontend deploy drops routes/90-root.conf + upstreams/frontend.conf into this
          # same tree to point the SPA route at its container. Back those two up, wipe core's base, and
          # restore them after the copy so a frontend deploy survives a core redeploy.
          cd "$STACK_DIR"
          rm -rf .gwbak
          mkdir -p .gwbak/routes .gwbak/upstreams
          cp -p gateway/conf.d/routes/90-root.conf .gwbak/routes/ 2>/dev/null || true
          cp -p gateway/conf.d/upstreams/frontend.conf .gwbak/upstreams/ 2>/dev/null || true
          rm -rf gateway
          echo "📦 Copying deployment files to dev stack..."
          cp -a "$GITHUB_WORKSPACE"/deploy/docker-compose.server.yml \
            "$GITHUB_WORKSPACE"/deploy/docker-compose.dev.yml \
            "$GITHUB_WORKSPACE"/deploy/rabbitmq \
            "$GITHUB_WORKSPACE"/deploy/gateway \
            "$GITHUB_WORKSPACE"/deploy/oauth2-proxy \
            "$GITHUB_WORKSPACE"/deploy/vault \
            "$GITHUB_WORKSPACE"/deploy/fluent-bit \
            "$STACK_DIR"/
          echo "📦 Syncing otel collector config to dev stack (preserves any otel/certs)..."
          mkdir -p "$STACK_DIR"/otel
          cp -a "$GITHUB_WORKSPACE"/deploy/otel/config.yaml \
            "$GITHUB_WORKSPACE"/deploy/otel/config.central.yaml \
            "$STACK_DIR"/otel/
          echo "🔧 Restoring frontend gateway overrides (no-op on a core-only stack)..."
          [ -f .gwbak/routes/90-root.conf ] && cp -p .gwbak/routes/90-root.conf gateway/conf.d/routes/90-root.conf || true
          [ -f .gwbak/upstreams/frontend.conf ] && cp -p .gwbak/upstreams/frontend.conf gateway/conf.d/upstreams/frontend.conf || true
          rm -rf .gwbak

      - name: Deploy dev stack
        env:
          IMAGE_REPOSITORY: ${{ steps.image.outputs.repository }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          STACK_DIR: ${{ steps.stack.outputs.dir }}
        run: |
          echo "🚀 Deploying to dev stack..."
          cd "$STACK_DIR"
          echo '📋 Checking .env file exists...'
          [ -f .env ] || { echo '❌ Missing .env file'; exit 1; }
          # Capture the workflow-resolved image coords BEFORE sourcing .env — a pinned or `latest`
          # IMAGE_TAG in .env would otherwise clobber the correct commit-SHA tag (there is no
          # `:latest` image; build-images only pushes commit-SHA tags).
          WF_IMAGE_REPOSITORY="${IMAGE_REPOSITORY}"; WF_IMAGE_TAG="${IMAGE_TAG}"
          source .env 2>/dev/null || true
          export IMAGE_REPOSITORY="${WF_IMAGE_REPOSITORY}"
          export IMAGE_TAG="${WF_IMAGE_TAG}"
          export COMPOSE_PROJECT_NAME=postyfox-dev
          echo '🔄 Pulling latest images...'
          docker compose -f docker-compose.server.yml -f docker-compose.dev.yml pull || { echo '❌ Failed to pull images'; exit 1; }
          echo '⬆️ Updating services...'
          docker compose -f docker-compose.server.yml -f docker-compose.dev.yml up -d --build || { echo '❌ Failed to start services'; exit 1; }
          echo '🔄 Reloading gateway + oauth2-proxy (their conf.d/templates are bind-mounted; up -d alone does not pick up content changes)...'
          docker compose -f docker-compose.server.yml -f docker-compose.dev.yml restart gateway oauth2-proxy || { echo '❌ Failed to restart gateway/oauth2-proxy'; exit 1; }
          echo '✅ Dev stack deployed successfully'
          docker compose -f docker-compose.server.yml -f docker-compose.dev.yml ps

      - name: Health check
        env:
          STACK_DIR: ${{ steps.stack.outputs.dir }}
        run: |
          echo "🏥 Running health checks..."
          sleep 10
          cd "$STACK_DIR"
          docker compose -f docker-compose.server.yml -f docker-compose.dev.yml ps | grep -E '(core-api|post-api)' | grep -E '(Up|healthy)' || {
            echo '⚠️ Warning: Some services may not be healthy yet'
          }
          true

      - name: Deployment summary
        if: success()
        run: |
          cat << 'EOF'
          ✅ Dev deployment completed successfully!
          
          📊 Stack Information:
          - Environment: Development (auto-deploy on every push)
          - Project: postyfox-dev
          - Location: /opt/postyfox/dev
          - Images: ${{ steps.image.outputs.repository }}-*:${{ github.event.workflow_run.head_sha }}
          
          🔗 Access points:
          - Core API: http://${{ env.DEPLOY_HOST }}:8080
          - Post API: http://${{ env.DEPLOY_HOST }}:8081
          - RabbitMQ Admin: http://${{ env.DEPLOY_HOST }}:15672
          
          📝 Check logs:
          - ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "cd /opt/postyfox/dev && docker compose logs -f core-api"
          EOF
