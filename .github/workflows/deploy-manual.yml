name: deploy-manual

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - development
          - production
      image_tag:
        description: 'Image tag to deploy (defaults to latest main commit)'
        required: false
        type: string
      confirm:
        description: 'Type "DEPLOY" to confirm'
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}

jobs:
  validate-confirmation:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: github.event.inputs.confirm != 'DEPLOY'
        run: |
          echo "❌ Deployment cancelled: confirmation not provided"
          echo "Please re-run and type 'DEPLOY' in the confirmation field"
          exit 1
      - run: echo "✅ Deployment confirmed"

  build-images:
    # Build + push container images to ghcr tagged with the commit SHA
    # (mirrors the `images` job in platform-ci.yml).
    needs: validate-confirmation
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: core-api
            context: .
            dockerfile: Dockerfile
            project: src/PostyFox.Api.Core/PostyFox.Api.Core.csproj
            assembly: PostyFox.Api.Core.dll
          - service: post-api
            context: .
            dockerfile: Dockerfile
            project: src/PostyFox.Api.Post/PostyFox.Api.Post.csproj
            assembly: PostyFox.Api.Post.dll
          - service: worker
            context: .
            dockerfile: Dockerfile
            project: src/PostyFox.Worker.Posting/PostyFox.Worker.Posting.csproj
            assembly: PostyFox.Worker.Posting.dll
          - service: connectors-node
            context: src/connectors-node
            dockerfile: src/connectors-node/Dockerfile
            project: ""
            assembly: ""
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.image_tag || github.ref }}

      - name: Determine image tag
        id: tag
        run: |
          if [ -z "${{ github.event.inputs.image_tag }}" ]; then
            TAG=$(git rev-parse HEAD)
          else
            TAG="${{ github.event.inputs.image_tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Normalize image repository name
        run: echo "IMAGE_REPOSITORY=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ env.IMAGE_REPOSITORY }}-${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          build-args: |
            PROJECT=${{ matrix.project }}
            ASSEMBLY=${{ matrix.assembly }}

  deploy-development:
    needs: [validate-confirmation, build-images]
    if: github.event.inputs.environment == 'development'
    name: Deploy development
    runs-on: [self-hosted]
    environment: development
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.image_tag || github.ref }}

      - name: Determine image tag
        id: tag
        run: |
          if [ -z "${{ github.event.inputs.image_tag }}" ]; then
            TAG=$(git rev-parse HEAD)
          else
            TAG="${{ github.event.inputs.image_tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Resolve image repository
        id: image
        run: |
          echo "repository=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve stack settings
        id: stack
        run: |
          echo "directory=dev" >> "$GITHUB_OUTPUT"
          echo "project=postyfox-dev" >> "$GITHUB_OUTPUT"

      - name: Copy deployment files
        env:
          STACK_DIR: /opt/postyfox/dev
        run: |
          echo "🧹 Removing stale gateway config, preserving any frontend-deployed overrides (conf.d/*.conf is glob-included; leftover fragments would still load)..."
          # The postyfox-frontend deploy drops routes/90-root.conf + upstreams/frontend.conf into this
          # same tree to point the SPA route at its container. Back those two up, wipe core's base, and
          # restore them after the copy so a frontend deploy survives a core redeploy.
          cd "$STACK_DIR"
          rm -rf .gwbak
          mkdir -p .gwbak/routes .gwbak/upstreams
          cp -p gateway/conf.d/routes/90-root.conf .gwbak/routes/ 2>/dev/null || true
          cp -p gateway/conf.d/upstreams/frontend.conf .gwbak/upstreams/ 2>/dev/null || true
          rm -rf gateway
          echo "📦 Copying deployment files to dev stack..."
          cp -a "$GITHUB_WORKSPACE"/deploy/docker-compose.server.yml \
            "$GITHUB_WORKSPACE"/deploy/docker-compose.dev.yml \
            "$GITHUB_WORKSPACE"/deploy/rabbitmq \
            "$GITHUB_WORKSPACE"/deploy/gateway \
            "$GITHUB_WORKSPACE"/deploy/vault \
            "$STACK_DIR"/
          if [ ! -d "$STACK_DIR/otel" ]; then
            echo "📦 otel directory not found in dev stack; copying default otel config..."
            cp -a "$GITHUB_WORKSPACE"/deploy/otel "$STACK_DIR"/
          else
            echo "⏭️ otel directory already exists in dev stack; skipping copy."
          fi
          echo "🔧 Restoring frontend gateway overrides (no-op on a core-only stack)..."
          [ -f .gwbak/routes/90-root.conf ] && cp -p .gwbak/routes/90-root.conf gateway/conf.d/routes/90-root.conf || true
          [ -f .gwbak/upstreams/frontend.conf ] && cp -p .gwbak/upstreams/frontend.conf gateway/conf.d/upstreams/frontend.conf || true
          rm -rf .gwbak

      - name: Deploy dev stack
        env:
          IMAGE_REPOSITORY: ${{ steps.image.outputs.repository }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          STACK_DIR: /opt/postyfox/dev
        run: |
          echo "🚀 Manually deploying development stack..."
          echo "Image: $IMAGE_REPOSITORY:${IMAGE_TAG}"
          cd "$STACK_DIR"
          echo '📋 Checking .env file exists...'
          [ -f .env ] || { echo '❌ Missing .env file'; exit 1; }
          source .env 2>/dev/null || true
          export IMAGE_REPOSITORY="$IMAGE_REPOSITORY"
          export IMAGE_TAG="$IMAGE_TAG"
          export COMPOSE_PROJECT_NAME=postyfox-dev
          echo '🔄 Pulling latest images...'
          docker compose -f docker-compose.server.yml -f docker-compose.dev.yml pull || { echo '❌ Failed to pull images'; exit 1; }
          echo '⬆️ Updating services...'
          docker compose -f docker-compose.server.yml -f docker-compose.dev.yml up -d || { echo '❌ Failed to start services'; exit 1; }
          echo '🔄 Reloading gateway (nginx.conf + conf.d are bind-mounted; up -d alone does not pick up content changes)...'
          docker compose -f docker-compose.server.yml -f docker-compose.dev.yml restart gateway || { echo '❌ Failed to restart gateway'; exit 1; }
          echo '✅ Deployment completed'
          docker compose -f docker-compose.server.yml -f docker-compose.dev.yml ps

      - name: Health check
        env:
          STACK_DIR: /opt/postyfox/dev
        run: |
          echo "🏥 Running health checks..."
          sleep 10
          cd "$STACK_DIR"
          docker compose -f docker-compose.server.yml -f docker-compose.dev.yml ps | grep -E '(core-api|post-api)' | grep -E '(Up|healthy)' || {
            echo '⚠️ Warning: Services may still be starting'
          }
          true

      - name: Summary
        if: success()
        run: |
          cat << 'EOF'
          ✅ Manual deployment completed!

          📊 Deployment Details:
          - Environment: development
          - Image Tag: ${{ steps.tag.outputs.tag }}
          - Triggered by: ${{ github.actor }}
          - Runner: self-hosted Linux
          - Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

  deploy-production:
    needs: [validate-confirmation, build-images]
    if: github.event.inputs.environment == 'production'
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.image_tag || github.ref }}

      - name: Determine image tag
        id: tag
        run: |
          if [ -z "${{ github.event.inputs.image_tag }}" ]; then
            TAG=$(git rev-parse HEAD)
          else
            TAG="${{ github.event.inputs.image_tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Resolve stack settings
        id: stack
        run: |
          echo "directory=prod" >> "$GITHUB_OUTPUT"
          echo "project=postyfox-prod" >> "$GITHUB_OUTPUT"

      - name: Resolve image repository
        id: image
        run: |
          echo "repository=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy deployment files
        env:
          STACK_DIR: /opt/postyfox/prod
        run: |
          echo "🧹 Removing stale gateway config, preserving any frontend-deployed overrides (conf.d/*.conf is glob-included; leftover fragments would still load)..."
          # The postyfox-frontend deploy drops routes/90-root.conf + upstreams/frontend.conf into this
          # same tree to point the SPA route at its container. Back those two up, wipe core's base, and
          # restore them after the copy so a frontend deploy survives a core redeploy.
          ssh -p ${{ env.DEPLOY_PORT }} \
            -i ~/.ssh/deploy_key \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "set -e; cd $STACK_DIR; \
             rm -rf .gwbak; mkdir -p .gwbak/routes .gwbak/upstreams; \
             cp -p gateway/conf.d/routes/90-root.conf .gwbak/routes/ 2>/dev/null || true; \
             cp -p gateway/conf.d/upstreams/frontend.conf .gwbak/upstreams/ 2>/dev/null || true; \
             rm -rf gateway" || {
            echo "❌ Failed to clean stale gateway config"
            exit 1
          }
          echo "📦 Copying deployment files to prod stack..."
          scp -P ${{ env.DEPLOY_PORT }} \
            -i ~/.ssh/deploy_key \
            -r deploy/docker-compose.server.yml \
            deploy/docker-compose.prod.yml \
            deploy/rabbitmq \
            deploy/gateway \
            deploy/vault \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/opt/postyfox/prod/ || {
            echo "❌ Failed to copy deployment files"
            exit 1
          }
          REMOTE_OTEL_MISSING=$(ssh -p ${{ env.DEPLOY_PORT }} \
            -i ~/.ssh/deploy_key \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "if [ -d $STACK_DIR/otel ]; then echo no; else echo yes; fi") || {
            echo "❌ Failed to determine whether otel directory exists on prod stack"
            exit 1
          }
          if [ "$REMOTE_OTEL_MISSING" = "yes" ]; then
            echo "📦 otel directory not found in prod stack; copying default otel config..."
            scp -P ${{ env.DEPLOY_PORT }} \
              -i ~/.ssh/deploy_key \
              -r deploy/otel \
              ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/opt/postyfox/prod/ || {
              echo "❌ Failed to copy otel directory"
              exit 1
            }
          else
            echo "⏭️ otel directory already exists in prod stack; skipping copy."
          fi
          echo "🔧 Restoring frontend gateway overrides (no-op on a core-only stack)..."
          ssh -p ${{ env.DEPLOY_PORT }} \
            -i ~/.ssh/deploy_key \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "set -e; cd $STACK_DIR; \
             [ -f .gwbak/routes/90-root.conf ] && cp -p .gwbak/routes/90-root.conf gateway/conf.d/routes/90-root.conf || true; \
             [ -f .gwbak/upstreams/frontend.conf ] && cp -p .gwbak/upstreams/frontend.conf gateway/conf.d/upstreams/frontend.conf || true; \
             rm -rf .gwbak" || {
            echo "❌ Failed to restore frontend gateway overrides"
            exit 1
          }

      - name: Deploy prod stack
        env:
          IMAGE_REPOSITORY: ${{ steps.image.outputs.repository }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          STACK_NAME: ${{ steps.stack.outputs.project }}
        run: |
          echo "🚀 Deploying to prod stack (⚠️ PRODUCTION)..."
          ssh -p ${{ env.DEPLOY_PORT }} \
            -i ~/.ssh/deploy_key \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "set -e; \
            cd /opt/postyfox/prod && \
            echo '📋 Checking .env file exists...' && \
            [ -f .env ] || { echo '❌ Missing .env file'; exit 1; }; \
            source .env 2>/dev/null || true; \
            export IMAGE_REPOSITORY=${{ env.IMAGE_REPOSITORY }} && \
            export IMAGE_TAG=${{ env.IMAGE_TAG }} && \
            export COMPOSE_PROJECT_NAME=${{ env.STACK_NAME }} && \
            echo '🔄 Pulling latest images...' && \
            docker compose -f docker-compose.server.yml -f docker-compose.prod.yml pull || { echo '❌ Failed to pull images'; exit 1; }; \
            echo '⬆️ Updating services (backup your data first!)...' && \
            docker compose -f docker-compose.server.yml -f docker-compose.prod.yml up -d || { echo '❌ Failed to start services'; exit 1; }; \
            echo '🔄 Reloading gateway (nginx.conf + conf.d are bind-mounted; up -d alone does not pick up content changes)...' && \
            docker compose -f docker-compose.server.yml -f docker-compose.prod.yml restart gateway || { echo '❌ Failed to restart gateway'; exit 1; }; \
            echo '✅ Prod stack deployed successfully' && \
            docker compose -f docker-compose.server.yml -f docker-compose.prod.yml ps" || {
            echo "❌ Prod deployment failed"
            exit 1
          }

      - name: Health check
        env:
          STACK_DIR: /opt/postyfox/prod
        run: |
          echo "🏥 Running health checks..."
          sleep 15
          ssh -p ${{ env.DEPLOY_PORT }} \
            -i ~/.ssh/deploy_key \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "cd $STACK_DIR && \
            docker compose -f docker-compose.server.yml -f docker-compose.prod.yml ps | grep -E '(core-api|post-api|worker)' | grep -E '(Up|healthy)' || { \
            echo '⚠️ Warning: Some services may not be healthy yet'; }; \
            true"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Summary
        if: success()
        run: |
          cat << 'EOF'
          ✅ Manual deployment completed!
          
          📊 Deployment Details:
          - Environment: production
          - Image Tag: ${{ steps.tag.outputs.tag }}
          - Triggered by: ${{ github.actor }}
          - Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
