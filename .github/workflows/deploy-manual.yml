name: deploy-manual

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - development
          - production
      image_tag:
        description: 'Image tag to deploy (defaults to latest main commit)'
        required: false
        type: string
      confirm:
        description: 'Type "DEPLOY" to confirm'
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}

jobs:
  validate-confirmation:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: github.event.inputs.confirm != 'DEPLOY'
        run: |
          echo "❌ Deployment cancelled: confirmation not provided"
          echo "Please re-run and type 'DEPLOY' in the confirmation field"
          exit 1
      - run: echo "✅ Deployment confirmed"

  build-images:
    # Build + push container images to ghcr tagged with the commit SHA
    # (mirrors the `images` job in platform-ci.yml).
    needs: validate-confirmation
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: core-api
            context: .
            dockerfile: Dockerfile
            project: src/PostyFox.Api.Core/PostyFox.Api.Core.csproj
            assembly: PostyFox.Api.Core.dll
          - service: post-api
            context: .
            dockerfile: Dockerfile
            project: src/PostyFox.Api.Post/PostyFox.Api.Post.csproj
            assembly: PostyFox.Api.Post.dll
          - service: worker
            context: .
            dockerfile: Dockerfile
            project: src/PostyFox.Worker.Posting/PostyFox.Worker.Posting.csproj
            assembly: PostyFox.Worker.Posting.dll
          - service: connectors-node
            context: src/connectors-node
            dockerfile: src/connectors-node/Dockerfile
            project: ""
            assembly: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.image_tag || github.ref }}

      - name: Determine image tag
        id: tag
        run: |
          if [ -z "${{ github.event.inputs.image_tag }}" ]; then
            TAG=$(git rev-parse HEAD)
          else
            TAG="${{ github.event.inputs.image_tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Normalize image repository name
        run: echo "IMAGE_REPOSITORY=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ env.IMAGE_REPOSITORY }}-${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          build-args: |
            PROJECT=${{ matrix.project }}
            ASSEMBLY=${{ matrix.assembly }}

  deploy-manual:
    needs: [validate-confirmation, build-images]
    name: Deploy ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.image_tag || github.ref }}

      - name: Determine image tag
        id: tag
        run: |
          if [ -z "${{ github.event.inputs.image_tag }}" ]; then
            TAG=$(git rev-parse HEAD)
          else
            TAG="${{ github.event.inputs.image_tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Resolve stack settings
        id: stack
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "suffix=prod" >> "$GITHUB_OUTPUT"
            echo "directory=prod" >> "$GITHUB_OUTPUT"
            echo "project=postyfox-prod" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=dev" >> "$GITHUB_OUTPUT"
            echo "directory=dev" >> "$GITHUB_OUTPUT"
            echo "project=postyfox-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image repository
        id: image
        run: |
          echo "repository=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ env.DEPLOY_PORT }} ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy deployment files
        env:
          IMAGE_REPOSITORY: ${{ steps.image.outputs.repository }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          STACK_DIR: /opt/postyfox/${{ steps.stack.outputs.directory }}
        run: |
          echo "📦 Copying deployment files to ${{ github.event.inputs.environment }} stack..."
          scp -P ${{ env.DEPLOY_PORT }} \
            -i ~/.ssh/deploy_key \
            -r deploy/docker-compose.server.yml \
            deploy/docker-compose.${{ steps.stack.outputs.suffix }}.yml \
            deploy/rabbitmq \
            deploy/otel \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.STACK_DIR }}/ || {
            echo "❌ Failed to copy deployment files"
            exit 1
          }

      - name: Deploy ${{ github.event.inputs.environment }} stack
        env:
          IMAGE_REPOSITORY: ${{ steps.image.outputs.repository }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          STACK_NAME: ${{ steps.stack.outputs.project }}
          STACK_DIR: /opt/postyfox/${{ steps.stack.outputs.directory }}
          COMPOSE_SUFFIX: ${{ steps.stack.outputs.suffix }}
        run: |
          echo "🚀 Manually deploying ${{ github.event.inputs.environment }} stack..."
          echo "Image: ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          
          ssh -p ${{ env.DEPLOY_PORT }} \
            -i ~/.ssh/deploy_key \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "set -e; \
            cd ${{ env.STACK_DIR }} && \
            echo '📋 Checking .env file exists...' && \
            [ -f .env ] || { echo '❌ Missing .env file'; exit 1; }; \
            source .env 2>/dev/null || true; \
            export IMAGE_REPOSITORY=${{ env.IMAGE_REPOSITORY }} && \
            export IMAGE_TAG=${{ env.IMAGE_TAG }} && \
            export COMPOSE_PROJECT_NAME=${{ env.STACK_NAME }} && \
            echo '🔄 Pulling latest images...' && \
            docker compose -f docker-compose.server.yml -f docker-compose.${{ env.COMPOSE_SUFFIX }}.yml pull || { echo '❌ Failed to pull images'; exit 1; }; \
            echo '⬆️ Updating services...' && \
            docker compose -f docker-compose.server.yml -f docker-compose.${{ env.COMPOSE_SUFFIX }}.yml up -d || { echo '❌ Failed to start services'; exit 1; }; \
            echo '✅ Deployment completed' && \
            docker compose -f docker-compose.server.yml -f docker-compose.${{ env.COMPOSE_SUFFIX }}.yml ps" || {
            echo "❌ Deployment failed"
            exit 1
          }

      - name: Health check
        env:
          STACK_DIR: /opt/postyfox/${{ steps.stack.outputs.directory }}
          COMPOSE_SUFFIX: ${{ steps.stack.outputs.suffix }}
        run: |
          echo "🏥 Running health checks..."
          sleep 15
          ssh -p ${{ env.DEPLOY_PORT }} \
            -i ~/.ssh/deploy_key \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "cd ${{ env.STACK_DIR }} && \
            docker compose -f docker-compose.server.yml -f docker-compose.${{ env.COMPOSE_SUFFIX }}.yml ps | grep -E '(core-api|post-api)' | grep -E '(Up|healthy)' || { \
            echo '⚠️ Warning: Services may still be starting'; }; \
            true"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Summary
        run: |
          cat << 'EOF'
          ✅ Manual deployment completed!
          
          📊 Deployment Details:
          - Environment: ${{ github.event.inputs.environment }}
          - Image Tag: ${{ steps.tag.outputs.tag }}
          - Triggered by: ${{ github.actor }}
          - Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF


