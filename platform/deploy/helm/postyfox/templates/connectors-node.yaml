apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "postyfox.fullname" . }}-connectors-node
  labels: {{- include "postyfox.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.services.connectorsNode.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/name: postyfox-connectors-node }
  template:
    metadata:
      labels: { app.kubernetes.io/name: postyfox-connectors-node }
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: connectors-node
          image: {{ include "postyfox.image" (list . "connectors-node") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: 8090 }]
          env:
            - { name: PORT, value: "8090" }
            - name: INTERNAL_TOKEN
              valueFrom: { secretKeyRef: { name: {{ include "postyfox.secretName" . }}, key: INTERNAL_TOKEN } }
          livenessProbe: { httpGet: { path: /health, port: 8090 }, initialDelaySeconds: 5, periodSeconds: 15 }
          resources: {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postyfox.fullname" . }}-connectors-node
  labels: {{- include "postyfox.labels" . | nindent 4 }}
spec:
  selector: { app.kubernetes.io/name: postyfox-connectors-node }
  ports: [{ port: 8090, targetPort: 8090 }]
