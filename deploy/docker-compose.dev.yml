# Docker Compose override for DEV environment
# Usage: docker compose -f docker-compose.server.yml -f docker-compose.dev.yml up
#
# Dev stack:
# - Uses external Keycloak and RustFS (shared infrastructure)
# - Isolated Postgres and RabbitMQ per stack/network
# - Only the OIDC edge (oauth2-proxy) publishes a host port; the APIs stay internal
# - Lighter resource constraints

x-dotnet-env: &dotnet-env
  ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-postyfox_dev};Username=postyfox;Password=${DB_PASSWORD}"
  ObjectStore__ServiceUrl: "${RUSTFS_PROTOCOL:-https}://${RUSTFS_HOST}:${RUSTFS_PORT:-9000}"
  ObjectStore__AccessKey: "${RUSTFS_ACCESS_KEY}"
  ObjectStore__SecretKey: "${RUSTFS_SECRET_KEY}"
  ObjectStore__Bucket: "postyfox-dev"
  RabbitMq__Host: "rabbitmq"
  RabbitMq__User: "${RABBITMQ_USER:-guest}"
  RabbitMq__Password: "${RABBITMQ_PASSWORD}"
  # Secret store (Neillans.Adapters.Secrets). Dev defaults to the bundled HashiCorp Vault (the
  # `vault` service, provisioned + AppRole-wired by `vault-init`). Set SECRETS_PROVIDER=InMemory for
  # an ephemeral store, or another provider (+ its Secrets__<Provider>__* options) — see README.
  Secrets__Provider: "${SECRETS_PROVIDER:-HashiCorpVault}"
  # HashiCorp Vault (bundled) — AppRole auth against the internal `vault` service.
  Secrets__HashiCorpVault__VaultAddress: "${VAULT_APP_ADDR:-http://vault:8200}"
  Secrets__HashiCorpVault__RoleId: "${VAULT_ROLE_ID:-}"
  Secrets__HashiCorpVault__SecretId: "${VAULT_SECRET_ID:-}"
  Secrets__HashiCorpVault__MountPoint: "${VAULT_MOUNT:-secret}"
  Secrets__HashiCorpVault__BasePath: "${VAULT_BASE_PATH:-postyfox}"
  Secrets__BitWarden__ServerUrl: "${BITWARDEN_SERVER_URL:-}"
  Secrets__BitWarden__ApiKey: "${BITWARDEN_API_KEY:-}"
  Secrets__BitWarden__ClientId: "${BITWARDEN_CLIENT_ID:-}"
  Secrets__BitWarden__ClientSecret: "${BITWARDEN_CLIENT_SECRET:-}"
  Secrets__BitWarden__OrganizationId: "${BITWARDEN_ORGANIZATION_ID:-}"
  Secrets__BitWarden__IdentityUrl: "${BITWARDEN_IDENTITY_URL:-}"
  Auth__UserHeader: "X-Auth-Request-User"
  NodeConnectors__InternalToken: "${INTERNAL_TOKEN:-postyfox-internal-dev-token}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_ENDPOINT}"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  ASPNETCORE_URLS: "http://+:8080"

services:
  postgres:
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-postyfox_dev}"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  rabbitmq:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  connectors-node:
    environment:
      OBJECT_STORE_SERVICE_URL: "${RUSTFS_PROTOCOL:-https}://${RUSTFS_HOST}:${RUSTFS_PORT:-9000}"
      OBJECT_STORE_ACCESS_KEY: "${RUSTFS_ACCESS_KEY}"
      OBJECT_STORE_SECRET_KEY: "${RUSTFS_SECRET_KEY}"
      OBJECT_STORE_BUCKET: "postyfox-dev"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  vault:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  vault-init:
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  # Only the edge publishes a host port; front it with your TLS terminator.
  oauth2-proxy:
    ports:
      - "${EDGE_PORT:-4180}:4180"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  core-api:
    environment:
      <<: *dotnet-env
      ApplyMigrations: "true"
      SeedServiceDefinitions: "true"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  post-api:
    environment:
      <<: *dotnet-env
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  worker:
    environment:
      <<: *dotnet-env
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

volumes:
  pgdata:
    name: postyfox-dev-pgdata
  rabbitmqdata:
    name: postyfox-dev-rabbitmq-data
  vaultdata:
    name: postyfox-dev-vault-data
  vaultkeys:
    name: postyfox-dev-vault-keys

