apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postyfox.fullname" . }}-config
  labels: {{- include "postyfox.labels" . | nindent 4 }}
data:
  ObjectStore__ServiceUrl: {{ .Values.config.objectStoreServiceUrl | quote }}
  ObjectStore__Bucket: {{ .Values.config.objectStoreBucket | quote }}
  RabbitMq__Host: {{ .Values.config.rabbitMqHost | quote }}
  RabbitMq__User: {{ .Values.config.rabbitMqUser | quote }}
  Auth__UserHeader: {{ .Values.config.authUserHeader | quote }}
  # Secret store (Neillans.Adapters.Secrets). Provider selection + non-secret provider options;
  # credentials are in the Secret. AzureKeyVault/Infisical add their own Secrets__<Provider>__* keys.
  Secrets__Provider: {{ .Values.config.secretsProvider | quote }}
  Secrets__HashiCorpVault__VaultAddress: {{ .Values.config.hashiCorpVaultAddress | quote }}
  Secrets__HashiCorpVault__MountPoint: {{ .Values.config.hashiCorpVaultMountPoint | quote }}
  Secrets__HashiCorpVault__BasePath: {{ .Values.config.hashiCorpVaultBasePath | quote }}
  Secrets__HashiCorpVault__RoleId: {{ .Values.config.hashiCorpVaultRoleId | quote }}
  Secrets__BitWarden__ServerUrl: {{ .Values.config.bitwardenServerUrl | quote }}
  Secrets__BitWarden__OrganizationId: {{ .Values.config.bitwardenOrganizationId | quote }}
  Secrets__BitWarden__IdentityUrl: {{ .Values.config.bitwardenIdentityUrl | quote }}
  # In-app OIDC bearer validation (defence-in-depth): the edge forwards the token, the APIs re-validate
  # it. The APIs trust no injected header, so this MUST be enabled or they reject every request.
  Auth__Oidc__Enabled: {{ .Values.config.authOidcEnabled | quote }}
  Auth__Oidc__Issuer: {{ .Values.config.authOidcIssuer | quote }}
  Auth__Oidc__JwksUrl: {{ .Values.config.authOidcJwksUrl | quote }}
  Auth__Oidc__Audience: {{ .Values.config.authOidcAudience | quote }}
  NodeConnectors__BaseUrl: "http://{{ include "postyfox.fullname" . }}-connectors-node:8090"
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelEndpoint | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  ASPNETCORE_URLS: "http://+:8080"
  PORT: "8090"
