apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "postyfox.fullname" . }}-core-api
  labels: {{- include "postyfox.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.services.coreApi.replicas }}
  selector:
    matchLabels: { app.kubernetes.io/name: postyfox-core-api }
  template:
    metadata:
      labels: { app.kubernetes.io/name: postyfox-core-api }
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: core-api
          image: {{ include "postyfox.image" (list . "core-api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: {{ include "postyfox.fullname" . }}-config }
            - secretRef: { name: {{ include "postyfox.secretName" . }} }
          env:
            - { name: ApplyMigrations, value: {{ .Values.services.coreApi.applyMigrations | quote }} }
            - { name: SeedServiceDefinitions, value: {{ .Values.services.coreApi.seedServiceDefinitions | quote }} }
          livenessProbe:  { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 15 }
          readinessProbe: { httpGet: { path: /readyz, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10 }
          resources: {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postyfox.fullname" . }}-core-api
  labels: {{- include "postyfox.labels" . | nindent 4 }}
spec:
  # Internal only — reached via the OIDC edge, never exposed publicly. Do not change to LoadBalancer.
  type: ClusterIP
  selector: { app.kubernetes.io/name: postyfox-core-api }
  ports: [{ port: 8080, targetPort: 8080 }]
