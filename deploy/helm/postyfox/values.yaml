# Published container images (built + pushed by CI). One repo per service, shared tag.
image:
  registry: ghcr.io
  repository: your-org/postyfox     # images: {registry}/{repository}-{service}:{tag}
  tag: latest
  pullPolicy: IfNotPresent
imagePullSecrets: []

# Backing services (PostgreSQL, RabbitMQ, S3/object store) are expected to be provided externally
# (managed services or separate charts). Only their connection details are configured here.
config:
  objectStoreServiceUrl: "http://rustfs:9000"   # any S3-compatible endpoint (RustFS/MinIO/managed S3)
  objectStoreBucket: "postyfox"
  rabbitMqHost: "rabbitmq"
  rabbitMqUser: "guest"
  authUserHeader: "X-Auth-Request-User"
  # In-app OIDC bearer validation. The APIs trust NO injected header — only the validated JWT the
  # edge forwards (or an API key). This MUST stay enabled. Point issuer/JWKS at your Keycloak.
  authOidcEnabled: "true"
  authOidcIssuer: "https://keycloak.example/realms/PostyFox"
  authOidcJwksUrl: "https://keycloak.example/realms/PostyFox/protocol/openid-connect/certs"
  authOidcAudience: "oauth2-proxy"
  otelEndpoint: "http://otel-collector:4317"
  # Secret store (Neillans.Adapters.Secrets): InMemory | BitWarden | AzureKeyVault | Infisical.
  # Non-secret provider options go here; credentials live under `secrets` below. For AzureKeyVault
  # or Infisical, set secretsProvider and add the matching Secrets__<Provider>__* keys to the
  # ConfigMap/Secret templates.
  secretsProvider: "BitWarden"
  bitwardenServerUrl: "https://vault.example.com"
  bitwardenOrganizationId: ""
  bitwardenIdentityUrl: ""

# Secret values. In production, source these from a secret manager (External Secrets / Sealed
# Secrets / CSI) rather than committing them. Leaving 'create: false' lets you supply your own
# Secret named "<release>-postyfox-secrets".
secrets:
  create: true
  postgresConnection: "Host=postgres;Port=5432;Database=postyfox;Username=postyfox;Password=postyfox"
  # Secret-store credentials for the selected config.secretsProvider (BitWarden shown). Supply EITHER
  # bitwardenApiKey OR the Organization API key pair (bitwardenClientId + bitwardenClientSecret).
  bitwardenApiKey: ""
  bitwardenClientId: ""
  bitwardenClientSecret: ""
  internalToken: "change-me"        # shared token core/worker ↔ connectors-node
  objectStoreAccessKey: "minioadmin"
  objectStoreSecretKey: "minioadmin"
  rabbitMqPassword: "guest"

services:
  coreApi:
    replicas: 2
    applyMigrations: "true"         # one service should own migrations/seed
    seedServiceDefinitions: "true"
  postApi:
    replicas: 2
  worker:
    replicas: 1
  connectorsNode:
    replicas: 1

resources:
  requests: { cpu: "100m", memory: "128Mi" }
  limits: { cpu: "1", memory: "512Mi" }

# SECURITY — exposure model: only the OIDC edge (oauth2-proxy) may be publicly reachable. The
# core-api/post-api/connectors-node Services are ClusterIP (internal) and must NEVER be given a
# public Ingress or LoadBalancer. This Ingress fronts the edge only.
#
# NB: this chart does not yet package the OIDC edge itself (oauth2-proxy + Keycloak) — deploy it
# separately (or as a follow-up, add it here) and point `edgeServiceName` at its in-cluster Service.
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: postyfox.example        # single public host → the OIDC edge
  edgeServiceName: oauth2-proxy # in-cluster Service name of the OIDC edge (NOT an API service)
  edgePort: 4180
  tls: []
