# PostyFox local stack. Quick start:  docker compose up --build
#
# Auth is the production-representative OIDC path: the stack always runs Keycloak + oauth2-proxy +
# an nginx gateway, and the APIs validate the OIDC bearer token in-app (no DevMode bypass). Reach the
# APIs through the edge at  http://localhost:4180  (which logs you in via Keycloak on http://localhost:8082
# and fans out to core-api/post-api). Hitting the APIs directly (:8080/:8081) requires a valid bearer.
name: postyfox

x-dotnet-env: &dotnet-env
  ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=postyfox;Username=postyfox;Password=postyfox"
  ObjectStore__ServiceUrl: "http://rustfs:9000"
  ObjectStore__AccessKey: "rustfsadmin"
  ObjectStore__SecretKey: "rustfsadmin"
  ObjectStore__Bucket: "postyfox"
  RabbitMq__Host: "rabbitmq"
  RabbitMq__User: "guest"
  RabbitMq__Password: "guest"
  # Secret store (Neillans.Adapters.Secrets). The base local stack bundles no vault, so use the
  # in-process store. Switch to a persistent backend by setting Secrets__Provider (HashiCorpVault |
  # BitWarden | AzureKeyVault | Infisical) + that provider's Secrets__<Provider>__* options. (The
  # dev/prod stacks add a bundled HashiCorp Vault and default to it — see docker-compose.dev/prod.yml.)
  Secrets__Provider: "InMemory"
  Auth__UserHeader: "X-Auth-Request-User"
  # In-app OIDC bearer validation. Issuer is the browser-facing Keycloak URL (matches the token `iss`);
  # JWKS is fetched over the in-cluster back channel (mirrors the oauth2-proxy split front/back-channel).
  Auth__Oidc__Enabled: "true"
  Auth__Oidc__Issuer: "http://localhost:8082/realms/PostyFox"
  Auth__Oidc__JwksUrl: "http://keycloak:8080/realms/PostyFox/protocol/openid-connect/certs"
  Auth__Oidc__Audience: "oauth2-proxy"
  NodeConnectors__BaseUrl: "http://connectors-node:8090"
  NodeConnectors__InternalToken: "postyfox-internal-dev-token"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  ASPNETCORE_URLS: "http://+:8080"

services:
  postgres:
    image: pgautoupgrade/pgautoupgrade:latest
    environment:
      POSTGRES_USER: postyfox
      POSTGRES_PASSWORD: postyfox
      POSTGRES_DB: postyfox
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postyfox"]
      interval: 5s
      timeout: 3s
      retries: 20

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_VOLUMES: /data
      RUSTFS_CONSOLE_ENABLE: "true"
    ports: ["9000:9000", "9001:9001"]
    volumes: ["rustfsdata:/data"]
    healthcheck:
      # Any HTTP response from the S3 endpoint (200/403) means it's up.
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:9000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    build: ./rabbitmq
    ports: ["5672:5672", "15672:15672"]
    # Run directly as the rabbitmq user (uid 999). Under rootless podman the default root→rabbitmq
    # privilege drop left the freshly-written .erlang.cookie unreadable (eacces); starting as 999
    # avoids the cross-uid transition.
    user: "999:999"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otel/config.yaml"]
    volumes: ["./otel/config.yaml:/etc/otel/config.yaml:ro"]
    depends_on:
      data-prepper: { condition: service_started }
    ports: ["4317:4317", "4318:4318"]

  data-prepper:
    image: opensearchproject/data-prepper:latest
    volumes:
      - ./data-prepper/data-prepper-config.yaml:/usr/share/data-prepper/config/data-prepper-config.yaml:ro
      - ./data-prepper/pipelines.yaml:/usr/share/data-prepper/pipelines/pipelines.yaml:ro

  connectors-node:
    build:
      context: ../src/connectors-node
    environment:
      PORT: "8090"
      INTERNAL_TOKEN: "postyfox-internal-dev-token"
      OBJECT_STORE_SERVICE_URL: "http://rustfs:9000"
      OBJECT_STORE_ACCESS_KEY: "rustfsadmin"
      OBJECT_STORE_SECRET_KEY: "rustfsadmin"
      OBJECT_STORE_BUCKET: "postyfox"
      OBJECT_STORE_FORCE_PATH_STYLE: "true"
      # Tumblr OAuth1 app (consumer) credentials — enable the "Connect with Tumblr" flow.
      TUMBLR_CONSUMER_KEY: "${TUMBLR_CONSUMER_KEY:-}"
      TUMBLR_CONSUMER_SECRET: "${TUMBLR_CONSUMER_SECRET:-}"
    ports: ["8090:8090"]
    depends_on:
      rustfs: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8090/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 20

  core-api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        PROJECT: src/PostyFox.Api.Core/PostyFox.Api.Core.csproj
        ASSEMBLY: PostyFox.Api.Core.dll
    environment:
      <<: *dotnet-env
      ApplyMigrations: "true"
      SeedServiceDefinitions: "true"
      # Public base URL the OAuth provider redirects back to; must match the provider app's
      # registered callback. Behind the edge that's the oauth2-proxy address.
      OAuth__CallbackBaseUrl: "${OAUTH_CALLBACK_BASE_URL:-http://localhost:4180}"
    ports: ["8080:8080"]
    healthcheck:
      # curl -f enforces HTTP 200-299; grep verifies the expected JSON status marker.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
      # core-api applies DB migrations + seeding before Kestrel starts listening, so allow a
      # grace window before failing probes count against the retry budget.
      start_period: 30s
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      rustfs: { condition: service_healthy }
      connectors-node: { condition: service_healthy }

  post-api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        PROJECT: src/PostyFox.Api.Post/PostyFox.Api.Post.csproj
        ASSEMBLY: PostyFox.Api.Post.dll
    environment:
      <<: *dotnet-env
    ports: ["8081:8080"]
    depends_on:
      core-api: { condition: service_healthy }
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      rustfs: { condition: service_healthy }
    healthcheck:
      # curl -f enforces HTTP 200-299; grep verifies the expected JSON status marker.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
      
  worker:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        PROJECT: src/PostyFox.Worker.Posting/PostyFox.Worker.Posting.csproj
        ASSEMBLY: PostyFox.Worker.Posting.dll
    environment:
      <<: *dotnet-env
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      rustfs: { condition: service_healthy }
      connectors-node: { condition: service_healthy }
    healthcheck:
      # curl -f enforces HTTP 200-299; grep verifies the expected JSON status marker.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20      

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Pin the issuer/frontend URL to the browser-facing address so token `iss` is stable
      # regardless of whether Keycloak is reached via the browser (localhost:8082) or the
      # in-cluster back channel (keycloak:8080). See oauth2-proxy split front/back-channel config.
      KC_HOSTNAME: "http://localhost:8082"
    volumes: ["./keycloak:/opt/keycloak/data/import:ro"]
    ports: ["8082:8080"]
    # The image has no curl/wget but does have bash; a /dev/tcp probe confirms the HTTP port is
    # accepting connections (Keycloak binds 8080 only at the end of boot, after realm import).
    healthcheck:
      test: ["CMD-SHELL", "</dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  # Internal path router behind oauth2-proxy. Fans /api/posts + /api/webhooks to post-api and
  # everything else to core-api, preserving the full request path. Not published publicly.
  gateway:
    image: nginx:alpine
    volumes:
      - "./gateway/nginx.conf:/etc/nginx/nginx.conf:ro"
      - "./gateway/conf.d:/etc/nginx/conf.d:ro"
    depends_on:
      core-api: { condition: service_healthy }
      post-api: { condition: service_healthy }

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    command: ["--config=/etc/oauth2-proxy.cfg"]
    volumes: ["./oauth2-proxy/oauth2-proxy.cfg:/etc/oauth2-proxy.cfg:ro"]
    ports: ["4180:4180"]
    # oauth2-proxy performs OIDC discovery at startup and exits if the issuer isn't reachable, so
    # wait for Keycloak to be healthy; restart is a safety net for the brief realm-readiness window.
    depends_on:
      keycloak: { condition: service_healthy }
      gateway: { condition: service_started }
    restart: unless-stopped

volumes:
  pgdata:
  rustfsdata:
