# Docker Compose override for PROD environment
# Usage: docker compose -f docker-compose.server.yml -f docker-compose.prod.yml up
#
# Prod stack:
# - Uses external Keycloak and RustFS (shared infrastructure)
# - Isolated Postgres and RabbitMQ per stack/network
# - Only the public API front ends publish host ports
# - Production resource constraints + restart policies
# - Health checks and monitoring enabled

x-dotnet-env: &dotnet-env
  ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-postyfox_prod};Username=postyfox;Password=${DB_PASSWORD}"
  ObjectStore__ServiceUrl: "http://${RUSTFS_HOST}:${RUSTFS_PORT:-9000}"
  ObjectStore__AccessKey: "${RUSTFS_ACCESS_KEY}"
  ObjectStore__SecretKey: "${RUSTFS_SECRET_KEY}"
  ObjectStore__Bucket: "postyfox-prod"
  RabbitMq__Host: "rabbitmq"
  RabbitMq__User: "${RABBITMQ_USER}"
  RabbitMq__Password: "${RABBITMQ_PASSWORD}"
  Secrets__EncryptionKey: "${SECRETS_ENCRYPTION_KEY}"
  Auth__UserHeader: "X-Auth-Request-User"
  NodeConnectors__InternalToken: "${INTERNAL_TOKEN:-postyfox-internal-prod-token}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_ENDPOINT}"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  ASPNETCORE_URLS: "http://+:8080"
  # Enable security hardening for prod
  Auth__DevMode: "false"

services:
  postgres:
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-postyfox_prod}"
      POSTGRES_INITDB_ARGS: "-c max_connections=200 -c shared_buffers=256MB -c effective_cache_size=1GB"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
  rabbitmq:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    environment:
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: "0.6"

  connectors-node:
    environment:
      OBJECT_STORE_SERVICE_URL: "http://${RUSTFS_HOST}:${RUSTFS_PORT:-9000}"
      OBJECT_STORE_ACCESS_KEY: "${RUSTFS_ACCESS_KEY}"
      OBJECT_STORE_SECRET_KEY: "${RUSTFS_SECRET_KEY}"
      OBJECT_STORE_BUCKET: "postyfox-prod"
      NODE_ENV: "production"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  core-api:
    environment:
      <<: *dotnet-env
      ApplyMigrations: "true"
      SeedServiceDefinitions: "false"
      RateLimit__Enabled: "true"
      RateLimit__RequestsPerMinute: "300"
    ports:
      - "${CORE_API_PORT:-9080}:8080"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  post-api:
    environment:
      <<: *dotnet-env
      RateLimit__Enabled: "true"
      RateLimit__RequestsPerMinute: "300"
    ports:
      - "${POST_API_PORT:-9081}:8080"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    environment:
      <<: *dotnet-env
      Pipeline__MaxDeliveryAttempts: "5"
      Pipeline__RetryBaseSeconds: "60"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  otel-collector:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  pgdata:
    name: postyfox-prod-pgdata
  rabbitmqdata:
    name: postyfox-prod-rabbitmq-data

