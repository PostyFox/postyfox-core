# Docker Compose override for PROD environment
# Usage: docker compose -f docker-compose.server.yml -f docker-compose.prod.yml up
#
# Prod stack:
# - Uses external Keycloak and RustFS (shared infrastructure)
# - Isolated Postgres and RabbitMQ per stack/network
# - Only the OIDC edge (oauth2-proxy) publishes a host port; the APIs stay internal
# - Production resource constraints + restart policies
# - Health checks and monitoring enabled

x-dotnet-env: &dotnet-env
  ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-postyfox_prod};Username=postyfox;Password=${DB_PASSWORD}"
  ObjectStore__ServiceUrl: "${RUSTFS_PROTOCOL:-https}://${RUSTFS_HOST}:${RUSTFS_PORT:-9000}"
  ObjectStore__AccessKey: "${RUSTFS_ACCESS_KEY}"
  ObjectStore__SecretKey: "${RUSTFS_SECRET_KEY}"
  ObjectStore__Bucket: "postyfox-prod"
  RabbitMq__Host: "rabbitmq"
  RabbitMq__User: "${RABBITMQ_USER}"
  RabbitMq__Password: "${RABBITMQ_PASSWORD}"
  # Secret store (Neillans.Adapters.Secrets). Production defaults to the bundled HashiCorp Vault (the
  # `vault` service, provisioned + AppRole-wired by `vault-init`). Switch backends by setting
  # SECRETS_PROVIDER (+ that provider's Secrets__<Provider>__* options) — see README.
  Secrets__Provider: "${SECRETS_PROVIDER:-HashiCorpVault}"
  # HashiCorp Vault (bundled) — AppRole auth against the internal `vault` service. RoleId/SecretId
  # are the same values vault-init pins on the AppRole, so the app authenticates with no hand-off.
  Secrets__HashiCorpVault__VaultAddress: "${VAULT_APP_ADDR:-http://vault:8200}"
  Secrets__HashiCorpVault__RoleId: "${VAULT_ROLE_ID:-}"
  Secrets__HashiCorpVault__SecretId: "${VAULT_SECRET_ID:-}"
  Secrets__HashiCorpVault__MountPoint: "${VAULT_MOUNT:-secret}"
  Secrets__HashiCorpVault__BasePath: "${VAULT_BASE_PATH:-postyfox}"
  Secrets__BitWarden__ServerUrl: "${BITWARDEN_SERVER_URL:-}"
  Secrets__BitWarden__ApiKey: "${BITWARDEN_API_KEY:-}"
  Secrets__BitWarden__ClientId: "${BITWARDEN_CLIENT_ID:-}"
  Secrets__BitWarden__ClientSecret: "${BITWARDEN_CLIENT_SECRET:-}"
  Secrets__BitWarden__OrganizationId: "${BITWARDEN_ORGANIZATION_ID:-}"
  Secrets__BitWarden__IdentityUrl: "${BITWARDEN_IDENTITY_URL:-}"
  Auth__UserHeader: "X-Auth-Request-User"
  NodeConnectors__InternalToken: "${INTERNAL_TOKEN:-postyfox-internal-prod-token}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_ENDPOINT}"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  ASPNETCORE_URLS: "http://+:8080"

services:
  postgres:
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-postyfox_prod}"
      POSTGRES_INITDB_ARGS: "-c max_connections=200 -c shared_buffers=256MB -c effective_cache_size=1GB"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
  rabbitmq:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  connectors-node:
    environment:
      OBJECT_STORE_SERVICE_URL: "${RUSTFS_PROTOCOL:-https}://${RUSTFS_HOST}:${RUSTFS_PORT:-9000}"
      OBJECT_STORE_ACCESS_KEY: "${RUSTFS_ACCESS_KEY}"
      OBJECT_STORE_SECRET_KEY: "${RUSTFS_SECRET_KEY}"
      OBJECT_STORE_BUCKET: "postyfox-prod"
      NODE_ENV: "production"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  vault:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  vault-init:
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  # Only the edge publishes a host port; front it with your TLS terminator / load balancer. The APIs
  # are reached internally (compose DNS round-robins across replicas), so no per-replica port ranges.
  oauth2-proxy:
    ports:
      - "${EDGE_PORT:-4180}:4180"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  core-api:
    environment:
      <<: *dotnet-env
      ApplyMigrations: "true"
      SeedServiceDefinitions: "false"
      RateLimit__Enabled: "true"
      RateLimit__RequestsPerMinute: "300"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G

  post-api:
    environment:
      <<: *dotnet-env
      RateLimit__Enabled: "true"
      RateLimit__RequestsPerMinute: "300"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G

  worker:
    environment:
      <<: *dotnet-env
      Pipeline__MaxDeliveryAttempts: "5"
      Pipeline__RetryBaseSeconds: "60"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G

  otel-collector:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  pgdata:
    name: postyfox-prod-pgdata
  rabbitmqdata:
    name: postyfox-prod-rabbitmq-data
  vaultdata:
    name: postyfox-prod-vault-data
  vaultkeys:
    name: postyfox-prod-vault-keys
