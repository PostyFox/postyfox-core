<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PostyFox — Maintenance</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #222;
    }
    .box {
      max-width: 480px;
      text-align: center;
      padding: 2.5rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
    p { margin: 0.25rem 0; color: #555; }
  </style>
</head>
<body>
  <div class="box">
    <h1>We'll be right back</h1>
    <p>PostyFox is undergoing scheduled maintenance.</p>
    <p>Please check back in a few minutes.</p>
  </div>
</body>
</html>
