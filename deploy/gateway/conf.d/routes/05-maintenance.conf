# Maintenance mode toggle: operators create ./gateway/maintenance/maintenance.flag (e.g. `touch`
# before a planned deploy, `rm` after) to force every request through the maintenance page below,
# regardless of backend health. nginx re-stats the file on every request (no reload needed), so the
# flag can be flipped mid-flight by a deploy script.
if (-f /etc/nginx/maintenance/maintenance.flag) {
    return 503;
}

# Serves the maintenance page for the flag above AND for automatic 502/503/504s raised when
# core-api/post-api are unreachable (e.g. mid-restart during a rolling update) — see
# proxy_intercept_errors/error_page in nginx.conf.
location @maintenance {
    root /etc/nginx/maintenance;
    internal;
    try_files /maintenance.html =503;
}
