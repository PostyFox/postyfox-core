# Browser (SPA) OpenTelemetry traces → internal OTel collector's OTLP/HTTP receiver.
#
# Same-origin path (the SPA is served from this same host), so there is NO CORS to configure. It
# sits behind oauth2-proxy like every other gateway route, so only authenticated sessions can post.
# Locked to the EXACT /v1/traces path so it can't be abused to inject arbitrary metrics/logs.
#
# NOTE: intentionally no rate limiting / sampling yet — add a `limit_req` here (and/or browser-side
# head sampling in postyfox-frontend) once real browser-traffic volume is known.
location = /otlp/v1/traces {
    client_max_body_size 4m;   # bound telemetry batches (tighter than the global limit below)
    proxy_pass http://otel-collector:4318/v1/traces;
}
