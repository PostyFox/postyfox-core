# post-api owns these paths, plus its Swagger/OpenAPI (published under distinct paths so they
# don't collide with core-api's /swagger + /openapi).
location /api/posts    { proxy_pass http://post; }
location /api/webhooks { proxy_pass http://post; }
location /swagger-post { proxy_pass http://post; }
location /openapi-post { proxy_pass http://post; }

# core-api owns the rest of the API surface + its own docs. These are explicit (rather than
# relying on the catch-all) so that /-rooted traffic can be handed to a frontend SPA when one is
# deployed, while the API and docs keep routing to core.
location /api/    { proxy_pass http://core; }
location /swagger { proxy_pass http://core; }
location /openapi { proxy_pass http://core; }
