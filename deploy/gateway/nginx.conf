# Internal path router sitting behind oauth2-proxy: fans /api/posts + /api/webhooks to post-api
# and everything else to core-api, preserving the full request path (which oauth2-proxy's
# sub-path upstreams do not). Not published — only oauth2-proxy is the public route.
events {}
http {
  upstream core { server core-api:8080; }
  upstream post { server post-api:8080; }
  server {
    listen 80;
    # Preserve the original Host/scheme (set by oauth2-proxy from the public TLS edge) instead of
    # nginx's default of rewriting Host to the upstream name (e.g. "core"). Without this, the
    # backends see plain HTTP on an internal hostname, so absolute URLs they generate (like the
    # OpenAPI "servers" entry used by Swagger's "Try it out") point at "http://core/..." and get
    # blocked as mixed content by browsers.
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Gateway's own liveness (for the container healthcheck) — not routed to a backend.
    location = /healthz { access_log off; return 200 "ok\n"; }
    location /api/posts    { proxy_pass http://post; }
    location /api/webhooks { proxy_pass http://post; }
    # post-api's Swagger UI/OpenAPI doc, published under distinct paths (see Program.cs) so they
    # don't collide with core-api's /swagger + /openapi, which own the catch-all below.
    location /swagger-post   { proxy_pass http://post; }
    location /openapi-post   { proxy_pass http://post; }
    location /             { proxy_pass http://core; }
  }
}
