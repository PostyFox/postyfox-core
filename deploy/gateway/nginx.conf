# Internal path router sitting behind oauth2-proxy. Not published — only oauth2-proxy is public.
#
# The router is composed from fragments in conf.d so each concern owns its own file:
#   conf.d/upstreams/*.conf  — backend upstreams (http context)
#   conf.d/routes/*.conf     — location blocks (server context), applied in filename order
#
# This lets a companion deployment (e.g. the PostyFox frontend) drop in its own upstream and a
# routes/90-root.conf that re-points the catch-all at the SPA, without this repo owning that
# config or the frontend repo having to duplicate the API routing. See postyfox-frontend/deploy.
# Access/error logs go to files on a shared volume, tailed by the fluent-bit sidecar and shipped to
# OpenSearch (ss4o_logs-nginx-*). Not stdout, so they stay off the OTel/journald path.
error_log /var/log/gateway/error.log warn;
events {}
http {
  access_log /var/log/gateway/access.log combined;
  # Bumped from nginx's 1m default: headroom for API payloads (e.g. media manifests) and browser
  # OTLP trace batches. The /otlp route caps itself tighter (see conf.d/routes/20-otlp.conf).
  client_max_body_size 10m;
  # oauth2-proxy already forwards the real scheme (https) from the public TLS edge, but this
  # listener is plain HTTP internally, so $scheme is always "http" and must NOT overwrite an
  # inbound X-Forwarded-Proto — only fill it in when it's genuinely absent (e.g. gateway hit
  # directly, such as in local dev without the oauth2-proxy/gateway chain).
  map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
  }

  # DNS resolver for request-time name resolution (used by variable proxy_pass, e.g. the frontend
  # SPA route). nginx's `resolver` needs a literal IP and can't read /etc/resolv.conf itself, and
  # that IP is runtime-specific (Docker embedded DNS 127.0.0.11 vs podman/netavark Aardvark at a
  # per-network address). The 40-resolver.envsh entrypoint hook derives it from the container's
  # /etc/resolv.conf and writes it here at startup. Glob include → harmless no-op if the hook was
  # not run (e.g. bare `nginx -t`) and nothing needs a resolver.
  include /etc/nginx/resolver.d/*.conf;

  # Backend upstreams (core/post here; a deployment may add more, e.g. the frontend container).
  include /etc/nginx/conf.d/upstreams/*.conf;

  server {
    listen 80;
    # Preserve the original Host/scheme (set by oauth2-proxy from the public TLS edge) instead of
    # nginx's default of rewriting Host to the upstream name (e.g. "core"). Without this, the
    # backends see plain HTTP on an internal hostname, so absolute URLs they generate (like the
    # OpenAPI "servers" entry used by Swagger's "Try it out") point at "http://core/..." and get
    # blocked as mixed content by browsers.
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Serve the maintenance page (conf.d/routes/05-maintenance.conf) instead of a raw error whenever
    # a backend is unreachable/mid-restart. No "=" here — that preserves the original 502/503/504
    # status on the response rather than remapping it.
    proxy_intercept_errors on;
    error_page 502 503 504 @maintenance;

    # Gateway's own liveness (for the container healthcheck) — not routed to a backend.
    location = /healthz { access_log off; return 200 "ok\n"; }

    # Route fragments, loaded in filename order (…/routes/90-root.conf owns the catch-all).
    include /etc/nginx/conf.d/routes/*.conf;
  }
}
