# OpenTelemetry Collector — LOCAL / bare stack (docker-compose.yml).
#
# Self-contained: telemetry is printed to the collector's own logs
# (`docker compose logs otel-collector`), so the local stack is observable with NO external
# OpenSearch / Data Prepper dependency. Deployed environments forward to the central Data Prepper
# instead — see config.central.yaml.
receivers:
  otlp:
    protocols:
      grpc: { endpoint: 0.0.0.0:4317 }
      http: { endpoint: 0.0.0.0:4318 }

processors:
  # Guardrail: keep the collector from ballooning if telemetry spikes. Must run first.
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25
  # Drop health-check spans before they hit the logs.
  filter/healthchecks:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.route"] == "/healthz"'
        - 'attributes["http.route"] == "/readyz"'
        - 'attributes["http.route"] == "/health"'
  batch: {}

exporters:
  debug: { verbosity: normal }

service:
  pipelines:
    traces:  { receivers: [otlp], processors: [memory_limiter, filter/healthchecks, batch], exporters: [debug] }
    metrics: { receivers: [otlp], processors: [memory_limiter, batch], exporters: [debug] }
    logs:    { receivers: [otlp], processors: [memory_limiter, batch], exporters: [debug] }
