# oauth2-proxy fronting core-api, wired to local Keycloak.
#
# Split front/back-channel so browser login and server-side token exchange each use a reachable
# address, while the token `iss` stays constant:
#   - Browser        → login at http://localhost:8082  (Keycloak published on the host)
#   - This container → token/JWKS at http://keycloak:8080  (in-cluster service DNS)
#   - Keycloak pins its issuer to http://localhost:8082 (KC_HOSTNAME), which every token's `iss`
#     matches, so validation succeeds even though the code is redeemed over the back channel.
http_address = "0.0.0.0:4180"
provider = "oidc"

skip_oidc_discovery = true
oidc_issuer_url = "http://localhost:8082/realms/PostyFox"
login_url = "http://localhost:8082/realms/PostyFox/protocol/openid-connect/auth"
redeem_url = "http://keycloak:8080/realms/PostyFox/protocol/openid-connect/token"
oidc_jwks_url = "http://keycloak:8080/realms/PostyFox/protocol/openid-connect/certs"

client_id = "oauth2-proxy"
client_secret = "oauth2-proxy-secret"
cookie_secret = "0123456789abcdef0123456789abcdef"
email_domains = ["*"]
upstreams = ["http://core-api:8080"]
redirect_url = "http://localhost:4180/oauth2/callback"

# Pass the authenticated identity to the upstream API.
pass_access_token = true
set_xauthrequest = true
pass_user_headers = true
skip_provider_button = true
