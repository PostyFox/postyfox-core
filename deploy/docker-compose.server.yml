# PostyFox single-host deployment stack.
# Intended for CI/CD deployment with published app images.
#
# - App services use prebuilt images from GHCR.
# - Postgres and RabbitMQ run per stack on the server.
# - RustFS and Keycloak are provided externally.
# - The OIDC edge (oauth2-proxy) is the ONLY service that publishes a public host port (via the
#   env-specific overrides); the APIs, gateway, and connectors-node stay on the internal network.

x-dotnet-env: &dotnet-env
  ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=postyfox;Username=postyfox;Password=${DB_PASSWORD}"
  ObjectStore__ServiceUrl: "${RUSTFS_PROTOCOL:-https}://${RUSTFS_HOST}:${RUSTFS_PORT:-9000}"
  ObjectStore__AccessKey: "${RUSTFS_ACCESS_KEY}"
  ObjectStore__SecretKey: "${RUSTFS_SECRET_KEY}"
  ObjectStore__Bucket: "postyfox"
  RabbitMq__Host: "rabbitmq"
  RabbitMq__User: "${RABBITMQ_USER}"
  RabbitMq__Password: "${RABBITMQ_PASSWORD}"
  # Secret store (Neillans.Adapters.Secrets). Defaults to the bundled HashiCorp Vault (the `vault`
  # service, provisioned + AppRole-wired by `vault-init`). Switch backends by setting SECRETS_PROVIDER
  # (InMemory | BitWarden | AzureKeyVault | Infisical) and that provider's Secrets__<Provider>__*
  # options — see README.
  Secrets__Provider: "${SECRETS_PROVIDER:-HashiCorpVault}"
  # HashiCorp Vault (bundled) — AppRole auth against the internal `vault` service. RoleId/SecretId
  # are the same values vault-init pins on the AppRole, so the app authenticates with no hand-off.
  Secrets__HashiCorpVault__VaultAddress: "${VAULT_APP_ADDR:-http://vault:8200}"
  Secrets__HashiCorpVault__RoleId: "${VAULT_ROLE_ID:-}"
  Secrets__HashiCorpVault__SecretId: "${VAULT_SECRET_ID:-}"
  Secrets__HashiCorpVault__MountPoint: "${VAULT_MOUNT:-secret}"
  Secrets__HashiCorpVault__BasePath: "${VAULT_BASE_PATH:-postyfox}"
  Secrets__BitWarden__ServerUrl: "${BITWARDEN_SERVER_URL:-}"
  Secrets__BitWarden__ApiKey: "${BITWARDEN_API_KEY:-}"
  Secrets__BitWarden__ClientId: "${BITWARDEN_CLIENT_ID:-}"
  Secrets__BitWarden__ClientSecret: "${BITWARDEN_CLIENT_SECRET:-}"
  Secrets__BitWarden__OrganizationId: "${BITWARDEN_ORGANIZATION_ID:-}"
  Secrets__BitWarden__IdentityUrl: "${BITWARDEN_IDENTITY_URL:-}"
  Auth__UserHeader: "${AUTH_USER_HEADER:-X-Auth-Request-User}"
  # In-app OIDC bearer validation: the edge forwards the validated token, the APIs re-validate it.
  # This MUST be enabled — the APIs trust NO injected identity header, only the OIDC bearer / API key.
  # Issuer = the browser-facing Keycloak URL (token `iss`); JWKS is fetched over the in-cluster back
  # channel — mirrors the oauth2-proxy split below.
  Auth__Oidc__Enabled: "true"
  Auth__Oidc__Issuer: "${KEYCLOAK_PUBLIC_URL}/realms/${KEYCLOAK_REALM:-PostyFox}"
  Auth__Oidc__JwksUrl: "${KEYCLOAK_PROTOCOL:-https}://${KEYCLOAK_HOST}:${KEYCLOAK_PORT:-8080}/realms/${KEYCLOAK_REALM:-PostyFox}/protocol/openid-connect/certs"
  Auth__Oidc__Audience: "${OIDC_CLIENT_ID:-oauth2-proxy}"
  NodeConnectors__BaseUrl: "http://connectors-node:8090"
  NodeConnectors__InternalToken: "${INTERNAL_TOKEN}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_ENDPOINT:-http://otel-collector:4317}"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  ASPNETCORE_URLS: "http://+:8080"

services:
  postgres:
    image: pgautoupgrade/pgautoupgrade:latest
    environment:
      POSTGRES_USER: postyfox
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: postyfox
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postyfox"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  rabbitmq:
    build: ./rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    user: "999:999"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Edge collector: shapes + forwards OTLP to the CENTRAL Data Prepper (config.central.yaml).
  # Holds no OpenSearch secrets. Set OTEL_CENTRAL_HOST to the central Data Prepper host.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      OTEL_CENTRAL_HOST: "${OTEL_CENTRAL_HOST:-central-data-prepper}"
      # Stamped onto every signal (resource.attributes.deployment@environment/@cluster).
      DEPLOY_ENV: "${DEPLOY_ENV:-dev}"
      DEPLOY_CLUSTER: "${DEPLOY_CLUSTER:-postyfox}"
    volumes:
      - ./otel/config.central.yaml:/etc/otel/config.yaml:ro
      # For verified TLS to the central instance, mount the CA and switch on tls in config.central.yaml:
      # - ./otel/certs:/etc/otel/certs:ro
    restart: unless-stopped

  # HashiCorp Vault — file storage backend + Shamir seal. Stays on the internal network (never
  # publishes a host port, same rule as the APIs). Initialised + auto-unsealed by `vault-init`.
  vault:
    image: "hashicorp/vault:${VAULT_VERSION:-1.18}"
    command: ["vault", "server", "-config=/vault/config/vault.hcl"]
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - ./vault/config/vault.hcl:/vault/config/vault.hcl:ro
      - vaultdata:/vault/file
    healthcheck:
      # Healthy once the API answers, whether sealed (exit 2) or unsealed (exit 0); only an
      # unreachable server (exit 1) is unhealthy — that lets vault-init run to unseal it.
      test: ["CMD-SHELL", "vault status >/dev/null 2>&1; s=$$?; [ $$s -eq 0 ] || [ $$s -eq 2 ]"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # Bootstrap + auto-unseal sidecar. On first boot it initialises Vault and saves the generated
  # unseal keys + root token to the `vaultkeys` volume; thereafter it watches Vault and re-applies
  # the saved keys whenever it is sealed, so the stack comes up unsealed unattended.
  vault-init:
    image: "hashicorp/vault:${VAULT_VERSION:-1.18}"
    entrypoint: ["/bin/sh", "/usr/local/bin/vault-bootstrap.sh"]
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_KEY_SHARES: "${VAULT_KEY_SHARES:-5}"
      VAULT_KEY_THRESHOLD: "${VAULT_KEY_THRESHOLD:-3}"
      # App secret-store provisioning: KV v2 mount + scoped policy + AppRole with pinned credentials.
      # These MUST match the Secrets__HashiCorpVault__* the app uses. Provisioning is skipped unless
      # both RoleId and SecretId are set (so pointing the app at another provider is a clean no-op).
      VAULT_MOUNT: "${VAULT_MOUNT:-secret}"
      VAULT_BASE_PATH: "${VAULT_BASE_PATH:-postyfox}"
      VAULT_ROLE_ID: "${VAULT_ROLE_ID:-}"
      VAULT_SECRET_ID: "${VAULT_SECRET_ID:-}"
    volumes:
      - ./vault/bootstrap.sh:/usr/local/bin/vault-bootstrap.sh:ro
      - vaultkeys:/vault/init
    depends_on:
      vault: { condition: service_healthy }
    healthcheck:
      # Healthy only when Vault is actually unsealed (exit 0), i.e. the sidecar has done its job.
      test: ["CMD-SHELL", "vault status >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  connectors-node:
    image: "${IMAGE_REPOSITORY}-connectors-node:${IMAGE_TAG}"
    environment:
      PORT: "8090"
      INTERNAL_TOKEN: "${INTERNAL_TOKEN}"
      OBJECT_STORE_SERVICE_URL: "${RUSTFS_PROTOCOL:-https}://${RUSTFS_HOST}:${RUSTFS_PORT:-9000}"
      OBJECT_STORE_ACCESS_KEY: "${RUSTFS_ACCESS_KEY}"
      OBJECT_STORE_SECRET_KEY: "${RUSTFS_SECRET_KEY}"
      OBJECT_STORE_BUCKET: "postyfox"
      OBJECT_STORE_FORCE_PATH_STYLE: "true"
      # OpenTelemetry (auto-instrumentation via --import in the image). Node uses OTLP/HTTP → the
      # collector's :4318. deployment.environment/cluster are stamped by the collector.
      OTEL_SERVICE_NAME: "postyfox-connectors-node"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_LOGS_EXPORTER: "otlp"
      # Skip cloud (GCP/AWS/Azure) resource detectors — avoids metadata-lookup timeouts at startup.
      OTEL_NODE_RESOURCE_DETECTORS: "env,host,os,serviceinstance,process"
      # Tumblr OAuth1 app (consumer) credentials — enable the "Connect with Tumblr" flow.
      TUMBLR_CONSUMER_KEY: "${TUMBLR_CONSUMER_KEY:-}"
      TUMBLR_CONSUMER_SECRET: "${TUMBLR_CONSUMER_SECRET:-}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8090/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  core-api:
    image: "${IMAGE_REPOSITORY}-core-api:${IMAGE_TAG}"
    environment:
      <<: *dotnet-env
      ApplyMigrations: "true"
      SeedServiceDefinitions: "true"
      # Public base URL the OAuth provider redirects back to; must match the provider app's
      # registered callback. Reuses the edge's public base URL (same host users reach the app on).
      OAuth__CallbackBaseUrl: "${PUBLIC_BASE_URL:-}"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      connectors-node: { condition: service_healthy }
      # Wait for the bundled Vault to be provisioned + unsealed (AppRole ready). Harmless when the
      # stack is pointed at another secret store — vault/vault-init still run for both dev/prod.
      vault-init: { condition: service_healthy }
    healthcheck:
      # curl -f enforces HTTP 200-299; grep verifies the expected JSON status marker.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
      # core-api applies DB migrations + seeding before Kestrel starts listening, so allow a
      # grace window before failing probes count against the retry budget.
      start_period: 30s
    restart: unless-stopped

  post-api:
    image: "${IMAGE_REPOSITORY}-post-api:${IMAGE_TAG}"
    environment:
      <<: *dotnet-env
    depends_on:
      core-api: { condition: service_healthy }
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      vault-init: { condition: service_healthy }
    healthcheck:
      # curl -f enforces HTTP 200-299; grep verifies the expected JSON status marker.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  worker:
    image: "${IMAGE_REPOSITORY}-worker:${IMAGE_TAG}"
    environment:
      <<: *dotnet-env
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      connectors-node: { condition: service_healthy }
      vault-init: { condition: service_healthy }
    healthcheck:
      # curl -f enforces HTTP 200-299; grep verifies the expected JSON status marker.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # Internal path router behind the edge. Fans /api/posts + /api/webhooks to post-api and everything
  # else to core-api, preserving the full request path. Never publishes a host port.
  gateway:
    image: nginx:alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/conf.d:/etc/nginx/conf.d:ro
      # nginx writes access/error logs here; the fluent-bit sidecar tails them (see below).
      - gateway-logs:/var/log/gateway
    depends_on:
      core-api: { condition: service_healthy }
      post-api: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # Tails nginx (gateway) access/error logs and forwards them to the local otel-collector (Fluent
  # Forward), which routes them to Data Prepper → ss4o_logs-nginx for the nginx integration. Holds
  # NO OpenSearch creds — this host only talks to the collector.
  fluent-bit:
    image: cr.fluentbit.io/fluent/fluent-bit:latest
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - gateway-logs:/var/log/gateway:ro
    depends_on:
      gateway: { condition: service_started }
      otel-collector: { condition: service_started }
    restart: unless-stopped

  # The OIDC edge — the ONLY service that should publish a public port (done in the env overrides).
  # Configured entirely via OAUTH2_PROXY_* env vars (no config file). Split front/back-channel:
  #   - browser redirects use KEYCLOAK_PUBLIC_URL (the token `iss`)
  #   - server-side token/JWKS use the in-cluster KEYCLOAK_HOST back channel
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    environment:
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      # Prometheus metrics endpoint scraped by the otel-collector (job: oauth2-proxy).
      OAUTH2_PROXY_METRICS_ADDRESS: "0.0.0.0:44180"
      OAUTH2_PROXY_PROVIDER: "oidc"
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_OIDC_ISSUER_URL: "${KEYCLOAK_PUBLIC_URL}/realms/${KEYCLOAK_REALM:-PostyFox}"
      OAUTH2_PROXY_LOGIN_URL: "${KEYCLOAK_PUBLIC_URL}/realms/${KEYCLOAK_REALM:-PostyFox}/protocol/openid-connect/auth"
      OAUTH2_PROXY_REDEEM_URL: "${KEYCLOAK_PROTOCOL:-https}://${KEYCLOAK_HOST}:${KEYCLOAK_PORT:-8080}/realms/${KEYCLOAK_REALM:-PostyFox}/protocol/openid-connect/token"
      OAUTH2_PROXY_OIDC_JWKS_URL: "${KEYCLOAK_PROTOCOL:-https}://${KEYCLOAK_HOST}:${KEYCLOAK_PORT:-8080}/realms/${KEYCLOAK_REALM:-PostyFox}/protocol/openid-connect/certs"
      OAUTH2_PROXY_CLIENT_ID: "${OIDC_CLIENT_ID:-oauth2-proxy}"
      OAUTH2_PROXY_CLIENT_SECRET: "${OIDC_CLIENT_SECRET}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_REDIRECT_URL: "${PUBLIC_BASE_URL}/oauth2/callback"
      # Single root upstream → the internal nginx gateway (which does the path routing).
      OAUTH2_PROXY_UPSTREAMS: "http://gateway:80/"
      # Anonymous, HMAC-signed inbound webhook — external senders can't do an OIDC login.
      OAUTH2_PROXY_SKIP_AUTH_ROUTES: "POST=^/api/webhooks/"
      # Forward the validated ID token to upstreams as `Authorization: Bearer` (APIs re-validate it).
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      # Without this, oauth2-proxy keeps forwarding the ID token captured at login until the cookie
      # itself expires (default 168h), even after the token's own `exp` has passed — causing
      # upstream APIs (and Swagger's "Try it out", which rides on the same session) to reject it
      # with 401 "token expired" well before the user's session actually ends. This forces
      # oauth2-proxy to use the refresh token to mint a fresh one before it goes stale.
      OAUTH2_PROXY_COOKIE_REFRESH: "${OAUTH2_PROXY_COOKIE_REFRESH:-60s}"
      # Sits behind a TLS-terminating reverse proxy on the host; trust X-Forwarded-* and set secure
      # cookies (set EDGE_COOKIE_SECURE=false only if you expose the edge over plain HTTP).
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_COOKIE_SECURE: "${EDGE_COOKIE_SECURE:-true}"
    depends_on:
      gateway: { condition: service_healthy }
      core-api: { condition: service_healthy }
      post-api: { condition: service_healthy }
    restart: unless-stopped

volumes:
  pgdata:
  rabbitmqdata:
  vaultdata:
  vaultkeys:
  gateway-logs:   # nginx access/error logs shared gateway → fluent-bit
