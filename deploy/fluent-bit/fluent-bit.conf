# Fluent Bit — tails nginx (gateway) access/error logs and forwards them to the local OTel
# collector (Fluent Forward protocol). The collector routes them to the CENTRAL Data Prepper on a
# dedicated nginx port, which writes them to ss4o_logs-nginx-<env> for the nginx integration.
#
# No OpenSearch creds/CA here — this host only talks to the local collector. deployment.environment
# /cluster and service.name are stamped by the collector's logs/nginx pipeline.
[SERVICE]
    Flush            5
    Daemon           Off
    Log_Level        info

[INPUT]
    Name             tail
    Tag              nginx.access
    Path             /var/log/gateway/access.log
    Refresh_Interval 5
    # raw: no Parser, so the whole access line stays in the `log` field (integration raw mode).

[INPUT]
    Name             tail
    Tag              nginx.error
    Path             /var/log/gateway/error.log
    Refresh_Interval 5

[OUTPUT]
    Name             forward
    Match            nginx.*
    Host             otel-collector
    Port             24224
