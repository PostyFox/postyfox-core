# Fluent Bit — tails nginx (gateway) access/error logs and sends them to the local OTel collector
# via OTLP/HTTP (:4319). The collector routes them to the CENTRAL Data Prepper on a dedicated nginx
# port, which writes them to ss4o_logs-nginx-<env> for the nginx integration.
#
# No OpenSearch creds/CA here — this host only talks to the local collector. deployment.environment
# /cluster and service.name are stamped by the collector's logs/nginx pipeline.
[SERVICE]
    Flush            5
    Daemon           Off
    Log_Level        info

# Inotify_Watcher Off: nginx writes the log in a DIFFERENT container to a shared (podman) named
# volume, and inotify append events don't reliably fire across that boundary — fluent-bit would open
# the file but never see new lines. Off falls back to stat-polling every Refresh_Interval instead.
# Read_from_Head On + DB: read the whole existing file on first run and persist the byte offset (in
# the fluent-bit-db volume) so a restart resumes where it left off rather than re-ingesting or
# skipping to the tail. One DB file per input (fluent-bit requires this).
[INPUT]
    Name             tail
    Tag              nginx.access
    Path             /var/log/gateway/access.log
    Refresh_Interval 5
    Read_from_Head   On
    Inotify_Watcher  Off
    DB               /var/lib/fluent-bit/nginx-access.db
    # raw: no Parser, so the whole access line stays in the `log` field (integration raw mode).

[INPUT]
    Name             tail
    Tag              nginx.error
    Path             /var/log/gateway/error.log
    Refresh_Interval 5
    Read_from_Head   On
    Inotify_Watcher  Off
    DB               /var/lib/fluent-bit/nginx-error.db

# OTLP/HTTP to the local collector's dedicated nginx receiver (:4319 → logs/nginx pipeline → Data
# Prepper :21893 → ss4o_logs-nginx). Replaces the Fluent Forward output: the collector's
# fluentforward receiver didn't reliably ingest Fluent Bit's forward-protocol records, whereas OTLP
# is the same path the apps use and is proven end-to-end. logs_body_key sends the raw nginx line as
# the OTLP log body (integration raw mode) rather than a {"log": …} map.
[OUTPUT]
    Name             opentelemetry
    Match            nginx.*
    Host             otel-collector
    Port             4319
    Logs_uri         /v1/logs
    logs_body_key    $log
    Log_response_payload False
    tls              Off
